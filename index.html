<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임 즐겨하는 잼민이 공식 웹사이트</title>
    <style>
        html, body {
            background-color: #0b0b12 !important;
            color: #ffffff !important;
            font-family: 'Malgun Gothic', sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .channel-title {
            color: #ff0055 !important;
            font-size: 3.5em;
            font-weight: bold;
            text-shadow: 0 0 10px #ff0055, 0 0 30px #ff0055;
            margin-bottom: 5px;
        }
        .channel-sub {
            font-size: 1.3em;
            color: #00ffcc !important;
            text-shadow: 0 0 8px #00ffcc;
            margin-bottom: 40px;
        }
        .main-box {
            background-color: #141423 !important;
            padding: 30px;
            border-radius: 20px;
            display: inline-block;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.3);
            border: 2px solid #ff0055 !important;
            box-sizing: border-box;
        }
        h2 {
            color: #ffff00 !important;
            font-size: 1.8em;
            margin-top: 0;
            text-align: left;
            border-bottom: 2px dashed #ffff00;
            padding-bottom: 8px;
        }
        .video-link-box {
            position: relative;
            display: block;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            transition: transform 0.3s ease;
        }
        .video-link-box:hover {
            transform: scale(1.02);
        }
        .video-link-box img {
            width: 100%;
            display: block;
        }
        .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background-color: rgba(255, 0, 85, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px #ff0055;
        }
        .play-btn::after {
            content: '';
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 15px 0 15px 25px;
            border-color: transparent transparent transparent #ffffff;
            margin-left: 5px;
        }
        .intro-text {
            font-size: 1.2em;
            line-height: 1.6;
            text-align: left;
            background-color: #1d1d35 !important;
            padding: 20px;
            border-radius: 10px;
            color: #e0e0ff !important;
        }
    </style>
</head>
<body>

    <div class="channel-title">게임 즐겨하는 잼민이</div>
    <div class="channel-sub">Official Site</div>

    <div class="main-box">
        <h2>🎥 최근 업로드 영상 구경하기 (클릭 시 재생)</h2>
        
        <a href="https://youtube.com/shorts/6sFSHUNRzyM" target="_blank" class="video-link-box">
            <img src="https://img.youtube.com/vi/6sFSHUNRzyM/maxresdefault.jpg" alt="게임 즐겨하는 잼민이 영상 썸네일">
            <div class="play-btn"></div>
        </a>

        <h2>💬 채널 소개</h2>
        <div class="intro-text">
            <p>👋 안녕하세요! <strong>[게임 즐겨하는 잼민이]</strong> 채널 공식 사이트에 오신 것을 환영합니다!</p>
            <p>🎮 여기서는 설명을 적겠습니다.</p>
            <p> 저는 게임을 하는 유튜버이고 도움이 되게 더 노력하겠습니다!</p>
        </div>
    </div>

</body>
</html>
